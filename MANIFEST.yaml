# PLUMB MANIFEST — Single Source of Truth
# Last updated: 2026-05-12

identity:
  name: plumb
  npm_package: plumb-bridge
  version: 0.1.0
  tagline: "Quiet pipes for noisy agents"
  motto: "silent, accurate, always down"

stack:
  runtime: bun
  typescript: true
  transport: a2a-http-sse
  protocol: jsonrpc-2.0
  ledger: jsonl-append-only

adapters:
  echo:
    cli: cat
    mode: oneshot
    tier: 1
    status: active
  pi:
    cli: pi
    mode: persistent
    tier: 1
    status: active
  claude:
    cli: claude
    mode: oneshot
    tier: 1
    status: active
  opencode:
    cli: opencode
    mode: oneshot
    tier: 2
    status: active
  generic:
    cli: any
    mode: oneshot
    tier: 3
    status: active

build_order:
  - types
  - core_ledger
  - core_process
  - core_executor
  - core_server
  - adapter_echo
  - adapter_generic
  - cli
  - conformance_test
  - adapter_pi
  - adapter_claude
  - adapter_opencode
  - adapter_cursor

build_state:
  phase: 0
  current: publish
  done:
    - types
    - core_ledger
    - core_process
    - core_executor
    - core_server
    - adapter_echo
    - adapter_generic
    - cli
    - conformance_test
    - adapter_pi
    - adapter_claude
    - adapter_opencode
  next: npm_publish
  blockers:
    - npm authentication not configured in CI/sandbox (local: npm login)

success_metrics:
  agent_card_test: PASS
  task_lifecycle_test: PASS
  ledger_survival_test: PASS
  routing_test: PASS

notes:
  adapter_cursor: skipped — host `cursor` binary is the IDE, not a headless coding agent CLI.

brand:
  palette: [slate, cistern, water, brass]
  villain: The Demo
  refusal: no-dashboards
  interface: logs-are-the-ui
  afterlife: dissolve-into-protocol
  metaphor: brass-plumb-bob
