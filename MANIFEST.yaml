# PLUMB MANIFEST — Single Source of Truth
# Last updated: 2026-05-13 — v0.∞.∞

identity:
  name: plumb
  npm_package: plumb-bridge
  version: 0.∞.∞
  repo: https://github.com/kariemSeiam/plumb
  tagline: "Quiet pipes for noisy agents"
  motto: "silent, accurate, always down"

stack:
  runtime: bun
  typescript: true
  transport: a2a-http-sse
  protocol: jsonrpc-2.0
  ledger: jsonl-append-only

adapters:
  echo:
    cli: cat
    mode: oneshot
    tier: 1
    status: active
  pi:
    cli: pi
    mode: persistent
    tier: 1
    status: active
  claude:
    cli: claude
    mode: oneshot
    tier: 1
    status: active
  cursor:
    cli: cursor-agent
    mode: oneshot
    tier: 1
    status: active
  opencode:
    cli: opencode
    mode: oneshot
    tier: 2
    status: active
  venom:
    cli: venom
    mode: oneshot
    tier: 3
    status: active
  generic:
    cli: any
    mode: oneshot
    tier: 3
    status: active

build_order:
  - types
  - core_ledger
  - core_process
  - core_executor
  - core_server
  - core_task_store
  - adapter_echo
  - adapter_generic
  - cli
  - conformance_test
  - adapter_pi
  - adapter_claude
  - adapter_cursor
  - adapter_opencode
  - adapter_venom
  - adapter_stream_json_utility
  - adapter_parse_test

build_state:
  phase: 0
  current: github_main
  done:
    - types
    - core_ledger
    - core_process
    - core_executor
    - core_server
    - core_task_store
    - adapter_echo
    - adapter_generic
    - cli
    - conformance_test
    - adapter_pi
    - adapter_claude
    - adapter_cursor
    - adapter_opencode
    - adapter_venom
    - adapter_stream_json_utility
    - adapter_parse_test
    - npm_publish
  next: tag_v0.1.2_push_for_ci
  blockers: []
  ci_note: GitHub Actions `publish-npm.yml` needs repo secret NPM_TOKEN (granular publish) to publish on tag push.

success_metrics:
  agent_card_test: PASS
  task_lifecycle_test: PASS
  ledger_survival_test: PASS
  routing_test: PASS

notes:
  adapter_host_editor: skipped — the packaged host IDE is not a headless coding-agent CLI.

brand:
  palette: [slate, cistern, water, brass]
  villain: The Demo
  refusal: no-dashboards
  interface: logs-are-the-ui
  afterlife: dissolve-into-protocol
  metaphor: brass-plumb-bob